<div class="d-flex justify-content-end mb-2">
    <button mat-mini-fab color="primary" (click)="openAddDialog()"><mat-icon>library_add</mat-icon></button>
</div>
<div class="d-flex justify-content-center">
    <table class="table">
        <thead>
            <tr>
                <th>Id.</th>
                <th>Name</th>
                <th>Created On</th>
                <th>Remove</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let library of libraries | async">
                <td>{{library.id}}</td>
                <td>{{library.name}}</td>
                <td>{{library.createdOn | date: 'shortDate'}}</td>
                <td><button mat-mini-fab color="primary" disabled><mat-icon>delete</mat-icon></button></td>
            </tr>
        </tbody>
    </table>
</div>
