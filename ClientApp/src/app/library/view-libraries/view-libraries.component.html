<div class="d-flex justify-content-center">
    <table class="table">
        <thead>
            <tr>
                <th>Id.</th>
                <th>Name</th>
                <th>Created On</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let library of libraries | async">
                <td>{{library.id}}</td>
                <td>{{library.name}}</td>
                <td>{{library.createdOn | date: 'short'}}</td>
            </tr>
        </tbody>
    </table>
</div>
