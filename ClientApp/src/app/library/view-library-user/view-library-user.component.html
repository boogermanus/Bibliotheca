<mat-card>
    <mat-card-title>
        Library Users
    </mat-card-title>
    <mat-card-content>
        <div>
            <mat-form-field [style.width.px]="300">
                <input matInput type="text" placeholder="email address">
            </mat-form-field>
            <button mat-mini-fab color="primary" class="ml-3">
                <mat-icon>add</mat-icon>
            </button>
        </div>
        <div>
            <mat-list *ngFor="let user of users | async">
                <mat-list-item>
                    <table>
                        <tr>
                        <td [style.width.px]="300">{{user.userName}}</td>
                        <td>
                            <button mat-mini-fab color="primary" *ngIf="currentUser.name !== user.userName">
                                <mat-icon>delete</mat-icon>
                            </button>
                        </td>
                        </tr>
                    </table>
                </mat-list-item>
            </mat-list>
        </div>
    </mat-card-content>
</mat-card>
